<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시도별 학생수 트리맵 2017–2025</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f13;--surface:#18181f;--surface2:#22222c;
  --border:rgba(255,255,255,0.07);--text:#f0efe8;--text2:#9b9a96;--text3:#4a4a48;
  --accent:#e8c97a;
  --유치원:#f5a623;--초등학교:#4ecb8d;--중학교:#5b9bd5;--고등학교:#c47ed6;--특수학교:#e07b6a;--기타:#7a7a80;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* 헤더 */
header{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-bottom:1px solid var(--border);background:var(--surface)}
.hdr-left h1{font-size:15px;font-weight:500;letter-spacing:-.2px}
.hdr-left p{font-size:11px;color:var(--text2);margin-top:2px}
.hdr-right{display:flex;align-items:center;gap:8px}

/* 컨트롤 버튼 그룹 */
.btn-group{display:flex;gap:2px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:3px}
.btn{padding:5px 12px;border:none;border-radius:6px;font-size:12px;font-family:inherit;cursor:pointer;color:var(--text2);background:transparent;transition:all .15s;white-space:nowrap}
.btn.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.4)}
.btn:hover:not(.active){color:var(--text)}

/* 연도 슬라이더 영역 */
.year-bar{display:flex;align-items:center;gap:0;border-bottom:1px solid var(--border);background:var(--surface);padding:0 28px}
.year-btn{flex:1;padding:12px 0;border:none;background:transparent;font-family:inherit;font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;transition:all .2s;border-bottom:2px solid transparent;letter-spacing:-.2px}
.year-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.year-btn:hover:not(.active){color:var(--text2)}

/* 요약 바 */
.stat-bar{display:flex;border-bottom:1px solid var(--border);background:var(--surface);overflow-x:auto}
.stat-item{flex:1;min-width:100px;padding:10px 16px;border-right:1px solid var(--border);cursor:pointer;transition:background .15s}
.stat-item:last-child{border-right:none}
.stat-item:hover,.stat-item.active{background:var(--surface2)}
.stat-item .lbl{font-size:10px;color:var(--text3);letter-spacing:.6px;text-transform:uppercase;display:flex;align-items:center;gap:4px}
.stat-item .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.stat-item .val{font-size:16px;font-weight:700;letter-spacing:-.5px;margin-top:3px}
.stat-item .chg{font-size:10px;margin-top:2px}
.chg.down{color:#e07b6a}.chg.up{color:#4ecb8d}.chg.neu{color:var(--text3)}

/* 메인 레이아웃 */
.main{display:grid;grid-template-columns:1fr 260px;height:calc(100vh - 145px)}

/* 트리맵 */
#tm-wrap{position:relative;overflow:hidden;padding:12px}
#tm-svg{width:100%;height:100%;display:block}
.tm-cell{cursor:pointer;transition:opacity .15s}
.tm-cell:hover{opacity:.8}
.breadcrumb{position:absolute;top:16px;left:18px;font-size:11px;color:var(--text2);pointer-events:none;display:flex;align-items:center;gap:5px}
.bc-link{color:var(--text3);cursor:pointer;pointer-events:all}
.bc-sep{color:var(--text3)}
.bc-cur{color:var(--text);font-weight:500}

/* 사이드 */
.side{border-left:1px solid var(--border);background:var(--surface);overflow-y:auto;display:flex;flex-direction:column}
.side-hdr{padding:14px 16px 10px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:10}
.side-hdr .sido-nm{font-size:18px;font-weight:700;letter-spacing:-.5px}
.side-hdr .sido-tot{font-size:11px;color:var(--text2);margin-top:2px}
.side-sec{padding:12px 16px;border-bottom:1px solid var(--border)}
.side-sec h3{font-size:10px;color:var(--text3);letter-spacing:.6px;text-transform:uppercase;margin-bottom:8px}

/* 연도 추세 미니차트 */
.trend-wrap{display:flex;flex-direction:column;gap:4px}
.trend-row{display:flex;align-items:center;gap:6px}
.trend-yr{font-size:10px;color:var(--text3);width:32px;flex-shrink:0}
.trend-bar-bg{flex:1;height:5px;background:var(--surface2);border-radius:3px;overflow:hidden}
.trend-bar-fill{height:100%;border-radius:3px;transition:width .4s ease}
.trend-val{font-size:10px;color:var(--text2);min-width:48px;text-align:right}

/* 학교급 바 */
.lv-row{margin-bottom:8px}
.lv-hdr{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px}
.lv-nm{font-size:11px;color:var(--text)}
.lv-val{font-size:11px;font-weight:600;color:var(--text)}
.lv-pct{font-size:10px;color:var(--text3);margin-left:3px}
.lv-bg{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden}
.lv-fill{height:100%;border-radius:2px;transition:width .4s ease}

/* 순위 */
.rank-row{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--border)}
.rank-row:last-child{border-bottom:none}
.rank-n{font-size:10px;color:var(--text3);width:14px;text-align:center;flex-shrink:0}
.rank-info{flex:1}
.rank-nm{font-size:11px;color:var(--text);margin-bottom:2px}
.rank-bar-bg{height:3px;background:var(--surface2);border-radius:2px;overflow:hidden}
.rank-fill{height:100%;border-radius:2px;transition:width .3s}
.rank-v{font-size:10px;color:var(--text2);min-width:44px;text-align:right}

/* 범례 */
.leg-item{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.leg-nm{font-size:11px;color:var(--text2);flex:1}
.leg-pct{font-size:10px;color:var(--text3)}

/* 툴팁 */
.tooltip{position:fixed;pointer-events:none;background:rgba(8,8,12,.95);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:8px;font-size:11px;line-height:1.7;z-index:9999;display:none}
.tooltip strong{font-size:12px;font-weight:600;display:block;margin-bottom:1px}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<header>
  <div class="hdr-left">
    <h1>시도별 학생수 트리맵</h1>
    <p id="hdr-sub">2017–2025년 · 전국 유초중등</p>
  </div>
  <div class="hdr-right">
    <div class="btn-group">

<div class="year-bar" id="year-bar"></div>

<div class="main">

  </div>
  <div class="side">
    <div class="side-hdr">

      <div class="sido-nm" id="side-nm">전국</div>
      <div class="sido-tot" id="side-tot"></div>
    </div>
    <div class="side-sec">
      <h3>연도별 추세</h3>
      <div class="trend-wrap" id="side-trend"></div>
    </div>
    <div class="side-sec">
      <h3>학교급별 현황</h3>
      <div id="side-lv"></div>
    </div>
    <div class="side-sec">
      <h3>시도 순위</h3>
      <div id="side-rank"></div>
    </div>
    <div class="side-sec">
      <h3>범례</h3>
      <div id="side-leg"></div>
    </div>
  </div>
</div>
<div class="tooltip" id="tip"></div>

const YEARS = ['2017','2018','2019','2020','2021','2022','2023','2024','2025'];
const SIDO_ORDER = ['서울','부산','대구','인천','광주','대전','울산','세종','경기','강원','충북','충남','전북','전남','경북','경남','제주'];
const LEVELS = ['유치원','초등학교','중학교','고등학교','특수학교'];
const LC = {'유치원':'#f5a623','초등학교':'#4ecb8d','중학교':'#5b9bd5','고등학교':'#c47ed6','특수학교':'#e07b6a','기타':'#7a7a80'};

let curYear = '2025', curLevel = 'all', curSido = null, drillDown = false;

// 집계
function getSidoTotals(year, level) {
  const d = RAW[year], map = {};
  SIDO_ORDER.forEach(s => { map[s] = {sido:s,total:0,schools:0}; LEVELS.forEach(l=>map[s][l]=0); });
  d.forEach(r => {
    if (!map[r.sido]) return;
    if (level==='all'||r.level===level) { map[r.sido].total+=r.students; map[r.sido].schools+=r.schools; }
    if (LEVELS.includes(r.level)) map[r.sido][r.level]+=r.students;
  });
  return SIDO_ORDER.map(s=>map[s]).filter(d=>d.total>0);
}
function getGrandTotal(year, level) { return getSidoTotals(year,level).reduce((s,d)=>s+d.total,0); }
function getLevelBreak(year, sido) {
  return LEVELS.map(l => {
    const r = RAW[year].find(d=>d.sido===sido&&d.level===l);
    return {level:l, students:r?.students||0, schools:r?.schools||0};
  }).filter(d=>d.students>0);
}

// 연도 버튼
function renderYearBar() {
  document.getElementById('year-bar').innerHTML = YEARS.map(y =>
    `<button class="year-btn ${y===curYear?'active':''}" onclick="setYear('${y}')">${y}년</button>`
  ).join('');
}

// 통계 바
function renderStatBar() {
  const data = getSidoTotals(curYear, curLevel);
  const total = data.reduce((s,d)=>s+d.total,0);
  const prevYear = String(+curYear-1);
  const prevTotal = RAW[prevYear] ? getGrandTotal(prevYear, curLevel) : null;
  const chgPct = prevTotal ? ((total-prevTotal)/prevTotal*100).toFixed(1) : null;
  const chgSign = chgPct>0?'+':'';
  const chgCls = chgPct>0?'up':chgPct<0?'down':'neu';

  const lvTotals = LEVELS.map(l => ({
    l, v: data.reduce((s,d)=>s+(d[l]||0),0)
  }));

  const items = [
    {lbl:'전국 학생수', dot:'#e8c97a', val:fmt(total), chg: chgPct?`${chgSign}${chgPct}% (전년비)`:curYear+'년 기준', cls:chgCls},
    ...lvTotals.map(({l,v})=>({lbl:l, dot:LC[l], val:fmt(v), chg:(v/total*100).toFixed(1)+'%', cls:'neu'}))
  ];

  document.getElementById('stat-bar').innerHTML = items.map((it,i) =>
    `<div class="stat-item ${curLevel===(i===0?'all':LEVELS[i-1])?'active':''}" onclick="${i===0?"setLevel('all')":"setLevel('"+LEVELS[i-1]+"')"}">
      <div class="lbl"><div class="dot" style="background:${it.dot}"></div>${it.lbl}</div>
      <div class="val">${it.val}</div>
      <div class="chg ${it.cls}">${it.chg}</div>
    </div>`
  ).join('');
}

function fmt(n) { return n>=10000?(n/10000).toFixed(1)+'만':n.toLocaleString(); }

// 툴팁
const tip = document.getElementById('tip');
function showTip(e,h){tip.style.display='block';tip.innerHTML=h}
function hideTip(){tip.style.display='none'}
document.addEventListener('mousemove',e=>{
  if(tip.style.display==='block'){tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY-8)+'px'}
});

// 트리맵
function renderTreemap() {
  const wrap = document.getElementById('tm-wrap');
  const svg = document.getElementById('tm-svg');
  const W = wrap.clientWidth, H = wrap.clientHeight;
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  svg.innerHTML='';

  const data = getSidoTotals(curYear, curLevel);
  const grandTotal = data.reduce((s,d)=>s+d.total,0);
  const maxTotal = d3.max(data,d=>d.total);

  let tmData;
  if (drillDown && curSido) {
    const br = getLevelBreak(curYear, curSido);
    tmData = {name:curSido, children: br.map(b=>({...b,sido:curSido,value:b.students}))};
  } else {
    tmData = {name:'전국', children: data.map(d=>({...d,value:d.total}))};
  }

  const root = d3.hierarchy(tmData).sum(d=>d.value||0).sort((a,b)=>b.value-a.value);
  d3.treemap().size([W,H]).paddingOuter(5).paddingInner(3).round(true)(root);

  const g = d3.select(svg);
  root.leaves().forEach((node,i) => {
    const d=node.data, x=node.x0, y=node.y0, w=node.x1-node.x0, h=node.y1-node.y0;
    if(w<2||h<2) return;

    const isDrill = drillDown && curSido;
    const color = isDrill ? (LC[d.level]||LC['기타']) : getColor(d, maxTotal);
    const val = isDrill ? d.students : d.total;
    const pct = (val/grandTotal*100).toFixed(1);

    const cell = g.append('g').attr('class','tm-cell');
    cell.append('rect').attr('x',x).attr('y',y).attr('width',w).attr('height',h)
      .attr('rx',4).attr('fill',color).attr('stroke','#0f0f13').attr('stroke-width',2);

    const pad=8;
    if(w>45&&h>26) {
      const nm = isDrill ? d.level : d.sido;
      cell.append('text').attr('x',x+pad).attr('y',y+pad+11)
        .attr('font-size',Math.min(14,Math.max(9,w/6))+'px').attr('font-weight','600')
        .attr('fill','rgba(255,255,255,0.92)').attr('font-family','Noto Sans KR,sans-serif')
        .text(nm);
    }
    if(w>65&&h>48) {
      cell.append('text').attr('x',x+pad).attr('y',y+pad+28)
        .attr('font-size',Math.min(11,Math.max(9,w/8))+'px')
        .attr('fill','rgba(255,255,255,0.6)').attr('font-family','Noto Sans KR,sans-serif')
        .text(val>=10000?(val/10000).toFixed(1)+'만':val.toLocaleString()+'명');
    }
    if(w>80&&h>64) {
      cell.append('text').attr('x',x+pad).attr('y',y+pad+44)
        .attr('font-size','10px').attr('fill','rgba(255,255,255,0.4)')
        .attr('font-family','Noto Sans KR,sans-serif').text(`전국 ${pct}%`);
    }

    const tipHtml = isDrill
      ? `<strong>${curSido} · ${d.level}</strong>${val.toLocaleString()}명 · ${d.schools}개교<br>전국 ${pct}%`
      : `<strong>${d.sido}</strong>${val.toLocaleString()}명 · ${d.schools}개교<br>전국 ${pct}%`;

    cell.on('mouseover',e=>showTip(e,tipHtml)).on('mouseout',hideTip)
      .on('click',()=>{
        if(!drillDown) { curSido=d.sido; drillDown=true; renderAll(); }
        else { resetDrill(); }
      });
  });

  // 브레드크럼
  const bc = document.getElementById('bc');
  if(drillDown&&curSido) {
    bc.innerHTML=`<span class="bc-link" onclick="resetDrill()">전국</span><span class="bc-sep">›</span><span class="bc-cur">${curSido}</span>`;
  } else {
    bc.innerHTML=`<span class="bc-cur">전국 ${curYear}년</span>`;
  }
}

function getColor(d, maxVal) {
  const ratio = d.total/maxVal;
  const hues = {'서울':200,'부산':220,'대구':185,'인천':210,'광주':165,'대전':230,'울산':175,
                '세종':195,'경기':215,'강원':180,'충북':205,'충남':170,'전북':190,'전남':160,'경북':225,'경남':155,'제주':200};
  const h = hues[d.sido]||200;
  const l = 20+ratio*25;
  return `hsl(${h},45%,${l}%)`;
}

function resetDrill() {
  curSido=null; drillDown=false; renderAll();
}

// 사이드패널
function renderSide() {
  const data = getSidoTotals(curYear, curLevel);
  const grandTotal = data.reduce((s,d)=>s+d.total,0);

  if(curSido&&drillDown) {
    const sd = data.find(d=>d.sido===curSido);
    document.getElementById('side-nm').textContent=curSido;
    document.getElementById('side-tot').textContent=
      `${(sd?.total||0).toLocaleString()}명 · 전국 ${((sd?.total||0)/grandTotal*100).toFixed(1)}%`;
  } else {
    document.getElementById('side-nm').textContent='전국';
    document.getElementById('side-tot').textContent=`${grandTotal.toLocaleString()}명`;
  }

  // 연도별 추세
  const trendData = YEARS.map(y => {
    const d = getSidoTotals(y, curLevel);
    const v = curSido&&drillDown ? (d.find(x=>x.sido===curSido)?.total||0) : d.reduce((s,x)=>s+x.total,0);
    return {year:y, val:v};
  });
  const maxTrend = Math.max(...trendData.map(d=>d.val));
  document.getElementById('side-trend').innerHTML = trendData.map(d=>
    `<div class="trend-row">
      <div class="trend-yr">${d.year}</div>
      <div class="trend-bar-bg"><div class="trend-bar-fill" style="width:${d.val/maxTrend*100}%;background:${d.year===curYear?'var(--accent)':'#3a3a48'}"></div></div>
      <div class="trend-val">${(d.val/10000).toFixed(1)}만</div>
    </div>`
  ).join('');

  // 학교급별
  const lvData = curSido&&drillDown
    ? getLevelBreak(curYear, curSido)
    : LEVELS.map(l=>({level:l,students:data.reduce((s,d)=>s+(d[l]||0),0)})).filter(d=>d.students>0);
  const maxLv = Math.max(...lvData.map(d=>d.students));
  const lvTotal = lvData.reduce((s,d)=>s+d.students,0);
  document.getElementById('side-lv').innerHTML = lvData.map(d=>
    `<div class="lv-row">
      <div class="lv-hdr"><span class="lv-nm">${d.level}</span>
        <span><span class="lv-val">${d.students.toLocaleString()}</span><span class="lv-pct">${(d.students/lvTotal*100).toFixed(1)}%</span></span>
      </div>
      <div class="lv-bg"><div class="lv-fill" style="width:${d.students/maxLv*100}%;background:${LC[d.level]}"></div></div>
    </div>`
  ).join('');

  // 순위
  const sorted = [...data].sort((a,b)=>b.total-a.total);
  const maxRank = sorted[0].total;
  document.getElementById('side-rank').innerHTML = sorted.map((d,i)=>
    `<div class="rank-row" style="${d.sido===curSido?'background:rgba(232,201,122,0.04);':''}">
      <div class="rank-n">${i+1}</div>
      <div class="rank-info">
        <div class="rank-nm" style="${d.sido===curSido?'color:var(--accent);font-weight:600;':''}">${d.sido}</div>
        <div class="rank-bar-bg"><div class="rank-fill" style="width:${d.total/maxRank*100}%;background:${d.sido===curSido?'var(--accent)':'#3a3a48'}"></div></div>
      </div>
      <div class="rank-v">${(d.total/10000).toFixed(1)}만</div>
    </div>`
  ).join('');

  // 범례
  document.getElementById('side-leg').innerHTML = LEVELS.map(l=>{
    const v = data.reduce((s,d)=>s+(d[l]||0),0);
    return `<div class="leg-item">
      <div class="leg-dot" style="background:${LC[l]}"></div>
      <span class="leg-nm">${l}</span>
      <span class="leg-pct">${(v/grandTotal*100).toFixed(1)}%</span>
    </div>`;
  }).join('');
}

function setYear(y) { curYear=y; drillDown=false; curSido=null; renderAll(); }
function setLevel(l) {
  curLevel=l;
  document.querySelectorAll('.btn').forEach((b,i)=>{
    b.classList.toggle('active',['all','유치원','초등학교','중학교','고등학교','특수학교'][i]===l);
  });
  renderAll();
}

function renderAll() {
  renderYearBar(); renderStatBar(); renderTreemap(); renderSide();
}

renderAll();
window.addEventListener('resize', renderTreemap);
</script>
</body>
</html>
